<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JA4 Hospital Ranchi | Patient Management</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --hosp-blue: #0369a1;
            --hosp-bg: #f0f9ff;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            background: var(--hosp-bg);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Loading Screen --- */
        #loadingScreen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e0f2fe;
            border-top: 5px solid var(--hosp-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- UI Layout --- */
        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #e2e8f0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }

        .brand {
            color: var(--hosp-blue);
            font-size: 1.3rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid var(--hosp-bg);
            padding-bottom: 15px;
        }

        .card {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #f1f5f9;
        }

        h3 { font-size: 0.85rem; margin: 0 0 10px 0; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0 10px 0;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-search { background: var(--hosp-blue); color: white; }
        .btn-add { background: var(--success); color: white; }
        button:hover { filter: brightness(90%); }

        /* --- Table Styling --- */
        .main-content { flex: 1; padding: 25px; display: flex; flex-direction: column; }

        .table-container {
            background: white;
            border-radius: 12px;
            flex: 1;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; text-align: left; padding: 15px; position: sticky; top: 0; z-index: 10; font-size: 0.8rem; color: var(--hosp-blue); }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }

        tr.highlight { background-color: #fef9c3 !important; font-weight: bold; }

        /* --- Toast Messages --- */
        #statusToast {
            display: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 5px;
        }
        .msg-success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .msg-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .msg-warning { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    </style>
</head>
<body>

<div id="loadingScreen">
    <div class="spinner"></div>
    <h2 id="loadingText" style="margin-top: 20px; color: var(--hosp-blue);">Accessing Records...</h2>
</div>

<div class="sidebar">
    <div class="brand"><i class="fa-solid fa-hospital-user"></i> JA4 RANCHI</div>

    <div class="card">
        <h3><i class="fa-solid fa-magnifying-glass"></i> Registry Search</h3>
        <input type="number" id="searchID" placeholder="Enter Patient ID">
        <select id="searchMethod">
            <option value="linear">Linear Search (Slow Scan)</option>
            <option value="binary">Binary Search (Fast Divide)</option>
        </select>
        <button class="btn-search" onclick="runSearch()">SEARCH SYSTEM</button>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-plus-circle"></i> New Admission</h3>
        <input type="number" id="newID" placeholder="ID #">
        <input type="text" id="newName" placeholder="Patient Full Name">
        <select id="newDept">
            <option>Cardiology</option>
            <option>Neurology</option>
            <option>Pediatrics</option>
            <option>Orthopedics</option>
        </select>
        <button class="btn-add" onclick="addNewPatient()">ADD PATIENT</button>
    </div>

    <div id="statusToast"></div>
</div>

<div class="main-content">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin:0; color: #1e293b;">Active Patient Database</h2>
        <div id="pCount" style="background: var(--hosp-blue); color:white; padding: 5px 15px; border-radius: 20px; font-weight: bold;">Records: 0</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Patient ID</th>
                    <th>Full Name</th>
                    <th>Department</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="registryBody"></tbody>
        </table>
    </div>
</div>

<script>
    let patients = [
        {id: 105, name: "Alice Brown", dept: "Cardiology"},
        {id: 203, name: "Bob Smith", dept: "Neurology"},
        {id: 101, name: "Carol White", dept: "Pediatrics"},
        {id: 307, name: "David Lee", dept: "Orthopedics"},
        {id: 150, name: "Eve Martin", dept: "Cardiology"}
    ];

    const firstNames = ["James", "Mary", "Robert", "Patricia", "Michael", "Linda", "William", "Elizabeth", "David", "Barbara", "Richard", "Susan", "Joseph", "Jessica", "Thomas", "Sarah", "Charles", "Karen", "Christopher", "Nancy"];
    const lastNames = ["Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis", "Rodriguez", "Martinez", "Hernandez", "Lopez", "Gonzalez", "Wilson", "Anderson", "Thomas", "Taylor", "Moore", "Jackson", "Martin"];
    const depts = ["Cardiology", "Neurology", "Pediatrics", "Orthopedics"];

    // 1. Generate up to 100 original-style names
    function initData() {
        while(patients.length < 100) {
            let id = 400 + patients.length;
            let name = firstNames[Math.floor(Math.random() * firstNames.length)] + " " + lastNames[Math.floor(Math.random() * lastNames.length)];
            patients.push({ id, name, dept: depts[patients.length % 4] });
        }
        patients.sort(() => Math.random() - 0.5); // Start unsorted
        updateUI();
    }

    function updateUI(highlightId = null) {
        const body = document.getElementById('registryBody');
        body.innerHTML = '';
        patients.forEach(p => {
            const tr = document.createElement('tr');
            if (p.id == highlightId) tr.className = 'highlight';
            tr.innerHTML = `<td><b>#${p.id}</b></td><td>${p.name}</td><td>${p.dept}</td><td style="color:var(--success)">● Admitted</td>`;
            body.appendChild(tr);
        });
        document.getElementById('pCount').innerText = `Records: ${patients.length}`;
    }

    function showStatus(msg, type) {
        const t = document.getElementById('statusToast');
        t.innerText = msg;
        t.className = 'msg-' + type;
        t.style.display = 'block';
    }

    // 2. Add Patient with DUPLICATE CHECK
    function addNewPatient() {
        const id = parseInt(document.getElementById('newID').value);
        const name = document.getElementById('newName').value;
        const dept = document.getElementById('newDept').value;

        if(!id || !name) return showStatus("Enter ID and Name", "error");

        // Duplicate Check Logic
        const exists = patients.some(p => p.id === id);
        if(exists) {
            showStatus("Duplicate Entry Found: ID #" + id + " already exists!", "warning");
            return;
        }

        patients.push({id, name, dept});
        updateUI(id);
        document.getElementById('newID').value = '';
        document.getElementById('newName').value = '';
        showStatus("Successfully Admitted " + name, "success");
        scrollRowIntoView();
    }

    // 3. Search Simulation
    async function runSearch() {
        const target = parseInt(document.getElementById('searchID').value);
        const method = document.getElementById('searchMethod').value;
        if(!target) return showStatus("Enter a Patient ID", "error");

        const loader = document.getElementById('loadingScreen');
        const loadText = document.getElementById('loadingText');
        loader.style.display = 'flex';
        document.getElementById('statusToast').style.display = 'none';

        // Algorithmic Delay Simulation
        let delay = method === 'linear' ? 3500 : 1500;
        loadText.innerText = method === 'linear' ? "Scanning every record (Linear)..." : "Binary Partitioning Active...";

        await new Promise(r => setTimeout(r, delay));

        let index = -1;
        const t0 = performance.now();

        if(method === 'linear') {
            index = patients.findIndex(p => p.id === target);
        } else {
            patients.sort((a,b) => a.id - b.id); // Must sort for Binary
            updateUI();
            let low = 0, high = patients.length - 1;
            while(low <= high) {
                let mid = Math.floor((low + high) / 2);
                if(patients[mid].id === target) { index = mid; break; }
                if(patients[mid].id < target) low = mid + 1;
                else high = mid - 1;
            }
        }

        const t1 = performance.now();
        loader.style.display = 'none';

        if(index !== -1) {
            updateUI(patients[index].id);
            showStatus(`Found: ${patients[index].name} (${((t1-t0)/1000).toFixed(4)}s)`, "success");
            scrollRowIntoView();
        } else {
            showStatus("Patient ID #" + target + " not found.", "error");
        }
    }

    function scrollRowIntoView() {
        setTimeout(() => {
            const el = document.querySelector('.highlight');
            if(el) el.scrollIntoView({behavior: 'smooth', block: 'center'});
        }, 100);
    }

    initData();
</script>
</body>
</html>
