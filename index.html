<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JA4 Hospital Ranchi | Patient Management</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --hosp-blue: #0369a1;
            --hosp-bg: #f0f9ff;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            background: var(--hosp-bg);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Loading Screen --- */
        #loadingScreen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* --- BIG RESULT BANNER --- */
        #resultBanner {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .banner-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .banner-icon { font-size: 80px; margin-bottom: 20px; }
        .banner-title { font-size: 2rem; font-weight: 800; margin-bottom: 10px; }
        .banner-details { font-size: 1.1rem; color: #475569; margin-bottom: 25px; line-height: 1.6; }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e0f2fe;
            border-top: 5px solid var(--hosp-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Sidebar & UI --- */
        .sidebar { width: 320px; background: white; border-right: 1px solid #e2e8f0; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .brand { color: var(--hosp-blue); font-size: 1.3rem; font-weight: 800; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid var(--hosp-bg); padding-bottom: 15px; }
        .card { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #f1f5f9; }
        h3 { font-size: 0.85rem; margin-bottom: 10px; color: #64748b; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 10px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-search { background: var(--hosp-blue); color: white; }
        .btn-add { background: var(--success); color: white; }
        .btn-close { background: #334155; color: white; padding: 10px 30px; margin-top: 10px; }

        /* --- Table Styling --- */
        .main-content { flex: 1; padding: 25px; display: flex; flex-direction: column; }
        .table-container { background: white; border-radius: 12px; flex: 1; overflow-y: auto; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; text-align: left; padding: 15px; position: sticky; top: 0; color: var(--hosp-blue); font-size: 0.8rem; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }
        tr.highlight { background-color: #fef9c3 !important; font-weight: bold; }

        #smallToast { display: none; padding: 10px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; text-align: center; }
        .t-warn { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    </style>
</head>
<body>

<!-- Loading Layer -->
<div id="loadingScreen">
    <div class="spinner"></div>
    <h2 id="loadingText" style="margin-top: 20px; color: var(--hosp-blue);">Accessing Records...</h2>
</div>

<!-- BIG RESULT BANNER -->
<div id="resultBanner">
    <div class="banner-content">
        <div id="bannerIcon" class="banner-icon"></div>
        <div id="bannerTitle" class="banner-title"></div>
        <div id="bannerDetails" class="banner-details"></div>
        <button class="btn-close" onclick="closeBanner()">CLOSE VIEW</button>
    </div>
</div>

<div class="sidebar">
    <div class="brand"><i class="fa-solid fa-hospital-user"></i> JA4 RANCHI</div>

    <div class="card">
        <h3><i class="fa-solid fa-magnifying-glass"></i> Registry Search</h3>
        <input type="number" id="searchID" placeholder="Enter ID (100-999)">
        <select id="searchMethod">
            <option value="linear">Linear Search (Slow Scan)</option>
            <option value="binary">Binary Search (Fast Divide)</option>
        </select>
        <button class="btn-search" onclick="runSearch()">SEARCH SYSTEM</button>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-plus-circle"></i> New Admission</h3>
        <input type="number" id="newID" placeholder="ID (100-999)">
        <input type="text" id="newName" placeholder="Patient Full Name">
        <select id="newDept">
            <option>Cardiology</option>
            <option>Neurology</option>
            <option>Pediatrics</option>
            <option>Orthopedics</option>
        </select>
        <button class="btn-add" onclick="addNewPatient()">ADD PATIENT</button>
    </div>

    <div id="smallToast"></div>
</div>

<div class="main-content">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin:0; color: #1e293b;">Central Patient Registry</h2>
        <div id="pCount" style="background: var(--hosp-blue); color:white; padding: 5px 15px; border-radius: 20px; font-weight: bold;">Records: 0</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Patient ID</th>
                    <th>Full Name</th>
                    <th>Department</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="registryBody"></tbody>
        </table>
    </div>
</div>

<script>
    let patients = [
        {id: 105, name: "Alice Brown", dept: "Cardiology"},
        {id: 203, name: "Bob Smith", dept: "Neurology"},
        {id: 101, name: "Carol White", dept: "Pediatrics"},
        {id: 307, name: "David Lee", dept: "Orthopedics"},
        {id: 150, name: "Eve Martin", dept: "Cardiology"}
    ];

    const firstNames = ["James", "Mary", "Robert", "Patricia", "Michael", "Linda", "William", "Elizabeth", "David", "Barbara", "Richard", "Susan", "Joseph", "Jessica", "Thomas", "Sarah", "Charles", "Karen", "Christopher", "Nancy"];
    const lastNames = ["Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis", "Rodriguez", "Martinez", "Hernandez", "Lopez", "Gonzalez", "Wilson", "Anderson", "Thomas", "Taylor", "Moore", "Jackson", "Martin"];
    const depts = ["Cardiology", "Neurology", "Pediatrics", "Orthopedics"];

    // 1. Generate 100 Patients with IDs 100-999
    function initData() {
        const usedIds = new Set(patients.map(p => p.id));
        
        while(patients.length < 100) {
            let randomId = Math.floor(Math.random() * (999 - 100 + 1)) + 100;
            if(!usedIds.has(randomId)) {
                let name = firstNames[Math.floor(Math.random() * firstNames.length)] + " " + lastNames[Math.floor(Math.random() * lastNames.length)];
                patients.push({ id: randomId, name, dept: depts[patients.length % 4] });
                usedIds.add(randomId);
            }
        }
        patients.sort(() => Math.random() - 0.5); 
        updateUI();
    }

    function updateUI(highlightId = null) {
        const body = document.getElementById('registryBody');
        body.innerHTML = '';
        patients.forEach(p => {
            const tr = document.createElement('tr');
            if (p.id == highlightId) tr.className = 'highlight';
            tr.innerHTML = `<td><b>#${p.id}</b></td><td>${p.name}</td><td>${p.dept}</td><td style="color:var(--success)">● Verified</td>`;
            body.appendChild(tr);
        });
        document.getElementById('pCount').innerText = `Records: ${patients.length}`;
    }

    // 2. Add Patient with Duplicate Check
    function addNewPatient() {
        const idInput = document.getElementById('newID').value;
        const name = document.getElementById('newName').value;
        const dept = document.getElementById('newDept').value;
        const toast = document.getElementById('smallToast');

        if(!idInput || !name) return alert("Please fill ID and Name");
        const id = parseInt(idInput);

        if(patients.some(p => p.id === id)) {
            toast.innerText = "DUPLICATE ID FOUND: #" + id;
            toast.className = "t-warn";
            toast.style.display = "block";
            return;
        }

        toast.style.display = "none";
        patients.push({id, name, dept});
        updateUI(id);
        document.getElementById('newID').value = '';
        document.getElementById('newName').value = '';
        setTimeout(() => document.querySelector('.highlight').scrollIntoView({behavior:'smooth', block:'center'}), 100);
    }

    // 3. BIG BANNER SEARCH
    async function runSearch() {
        const target = parseInt(document.getElementById('searchID').value);
        const method = document.getElementById('searchMethod').value;
        if(!target) return alert("Enter a Patient ID");

        document.getElementById('loadingScreen').style.display = 'flex';
        document.getElementById('loadingText').innerText = method === 'linear' ? "Searching Every Record (Linear Scan)..." : "Dividing Database (Binary Search)...";

        // Simulated algorithmic delay
        await new Promise(r => setTimeout(r, method === 'linear' ? 3500 : 1200));

        let index = -1;
        if(method === 'linear') {
            index = patients.findIndex(p => p.id === target);
        } else {
            patients.sort((a,b) => a.id - b.id);
            updateUI();
            let low = 0, high = patients.length - 1;
            while(low <= high) {
                let mid = Math.floor((low + high) / 2);
                if(patients[mid].id === target) { index = mid; break; }
                if(patients[mid].id < target) low = mid + 1;
                else high = mid - 1;
            }
        }

        document.getElementById('loadingScreen').style.display = 'none';
        showBanner(index, target);
    }

    function showBanner(index, id) {
        const banner = document.getElementById('resultBanner');
        const icon = document.getElementById('bannerIcon');
        const title = document.getElementById('bannerTitle');
        const details = document.getElementById('bannerDetails');

        if(index !== -1) {
            const p = patients[index];
            icon.innerHTML = '<i class="fa-solid fa-circle-check" style="color:var(--success)"></i>';
            title.innerText = "PATIENT FOUND";
            title.style.color = "var(--success)";
            details.innerHTML = `<strong>ID: #${p.id}</strong><br>Name: ${p.name}<br>Dept: ${p.dept}`;
            updateUI(p.id);
            setTimeout(() => document.querySelector('.highlight').scrollIntoView({behavior:'smooth', block:'center'}), 200);
        } else {
            icon.innerHTML = '<i class="fa-solid fa-circle-xmark" style="color:var(--danger)"></i>';
            title.innerText = "NOT FOUND";
            title.style.color = "var(--danger)";
            details.innerText = "The Patient ID #" + id + " does not exist in our central database.";
        }
        banner.style.display = 'flex';
    }

    function closeBanner() {
        document.getElementById('resultBanner').style.display = 'none';
    }

    initData();
</script>
</body>
</html>
